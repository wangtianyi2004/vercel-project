<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDP Insight 综合分析平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --sidebar-width: 260px;

            /* ClickHouse-inspired palette */
            --bg-base:        #000000;
            --bg-card:        #0C0C0C;
            --bg-elevated:    #151515;
            --bg-code:        #050505;
            --bg-subtle:      #0A0A0A;

            --border:         #1E1E1E;
            --border-strong:  #2A2A2A;
            --border-yellow:  rgba(250, 255, 105, 0.35);

            --text-primary:   #FFFFFF;
            --text-secondary: #A8A8A8;
            --text-muted:     #6E6E6E;
            --text-dim:       #4A4A4A;

            --yellow:         #FAFF69;
            --yellow-hover:   #FFFF85;
            --yellow-dim:     rgba(250, 255, 105, 0.08);
            --yellow-glow:    rgba(250, 255, 105, 0.15);

            --red:            #FF6B6B;
            --red-dim:        rgba(255, 107, 107, 0.08);
            --orange:         #FFB347;
            --orange-dim:     rgba(255, 179, 71, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', 'PingFang SC', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(circle at 20% 0%, rgba(250, 255, 105, 0.03), transparent 50%),
                radial-gradient(circle at 90% 100%, rgba(250, 255, 105, 0.02), transparent 50%);
        }

        code, pre, .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }

        /* ========== 侧边栏 ========== */
        #sidebar {
            width: var(--sidebar-width);
            background-color: #000;
            color: var(--text-primary);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 50;
            border-right: 1px solid var(--border);
        }

        .sidebar-brand {
            padding: 1.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-brand h2 {
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .brand-dot {
            width: 8px; height: 8px;
            background: var(--yellow);
            border-radius: 2px;
            box-shadow: 0 0 12px var(--yellow-glow);
        }
        .sidebar-brand p {
            font-size: 0.6875rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .sidebar-item {
            padding: 0.9rem 1.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }
        .sidebar-item:hover {
            background-color: var(--bg-subtle);
            color: var(--text-primary);
        }
        .sidebar-item.active {
            background-color: var(--yellow-dim);
            color: var(--yellow);
            border-left-color: var(--yellow);
        }
        .sidebar-item svg { opacity: 0.8; }
        .sidebar-item.active svg { opacity: 1; }

        .sidebar-footer {
            padding: 1.25rem 1.5rem;
            font-size: 0.6875rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.04em;
        }

        /* ========== 主容器 ========== */
        #main-container {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            padding: 2.5rem 3rem;
            overflow-y: auto;
        }

        /* ========== 卡片 ========== */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            transition: border-color 0.2s;
        }

        /* ========== 代码块 ========== */
        .code-block {
            background-color: var(--bg-code);
            color: #E5E5E5;
            padding: 1.25rem 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8125rem;
            overflow-x: auto;
            line-height: 1.7;
            margin-bottom: 1.25rem;
            position: relative;
        }
        .code-block::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--yellow);
            opacity: 0.6;
            border-radius: 0.5rem 0 0 0.5rem;
        }
        .code-block code { color: inherit; }

        /* ========== 主导航（顶部 tab） ========== */
        .main-nav-btn {
            position: relative;
            padding: 0.5rem 0 1rem;
            font-weight: 600;
            font-size: 0.9375rem;
            color: var(--text-muted);
            transition: color 0.15s;
            background: transparent;
            border: none;
            cursor: pointer;
            letter-spacing: -0.01em;
        }
        .main-nav-btn:hover { color: var(--text-primary); }
        .main-nav-btn.active { color: var(--yellow); }
        .main-nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0; right: 0;
            height: 2px;
            background: var(--yellow);
            box-shadow: 0 0 8px var(--yellow-glow);
        }

        /* ========== 子导航 pill ========== */
        .sub-tab-pill {
            padding: 0.5rem 1.25rem;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.15s;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .sub-tab-pill:hover { color: var(--text-primary); }
        .sub-tab-pill.active {
            background-color: var(--yellow);
            color: #000;
        }

        .tab-btn-pill {
            padding: 0.5rem 2rem;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            font-weight: 600;
            transition: all 0.15s;
        }
        .tab-btn-pill.active {
            background-color: var(--yellow);
            color: #000;
        }

        /* ========== 段落标题 ========== */
        .section-title {
            position: relative;
            padding-left: 1rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.35rem;
            bottom: 0.35rem;
            width: 3px;
            background: var(--yellow);
            border-radius: 2px;
        }

        /* ========== 数据表格 ========== */
        .perf-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .perf-table th {
            background-color: var(--bg-subtle);
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            padding: 10px 12px;
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .perf-table td {
            padding: 10px 12px;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .perf-table tr:hover td { background: rgba(255,255,255,0.02); }
        .highlight-row td {
            background-color: var(--yellow-dim) !important;
            color: var(--yellow);
            font-weight: 700;
            border-color: var(--border-yellow);
        }

        /* ========== 结论折叠项 ========== */
        .conclusion-item {
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            overflow: hidden;
            background: var(--bg-card);
            margin-bottom: 0.875rem;
            transition: border-color 0.2s;
        }
        .conclusion-item:hover { border-color: var(--border-strong); }
        .conclusion-item.is-open { border-color: var(--border-yellow); }

        .conclusion-header {
            padding: 1.125rem 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background-color 0.15s;
        }
        .conclusion-header:hover { background-color: var(--bg-subtle); }

        .conclusion-content {
            display: none;
            padding: 1.25rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border);
            background-color: var(--bg-subtle);
        }
        .conclusion-content.active { display: block; }
        .conclusion-content h5 {
            color: var(--yellow);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.75rem;
        }
        .conclusion-content p, .conclusion-content li { color: var(--text-secondary); }

        .toggle-icon {
            transition: transform 0.2s;
            color: var(--text-muted);
        }
        .is-open .toggle-icon { transform: rotate(180deg); color: var(--yellow); }

        /* ========== Callout 块（替代 bg-blue-50 等） ========== */
        .callout {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--yellow);
            padding: 1.25rem 1.5rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
        }
        .callout-yellow {
            background: var(--yellow-dim);
            border: 1px solid var(--border-yellow);
            border-left: 3px solid var(--yellow);
            padding: 1rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #F0F5B8;
        }
        .callout-yellow strong { color: var(--yellow); }
        .callout-red {
            background: var(--red-dim);
            border: 1px solid rgba(255, 107, 107, 0.25);
            border-left: 3px solid var(--red);
            padding: 1rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #FFC8C8;
        }
        .callout-red strong { color: var(--red); }
        .callout-neutral {
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-left: 3px solid var(--text-secondary);
            padding: 1rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .callout-neutral strong { color: var(--text-primary); }

        /* ========== 标签 chip ========== */
        .tag-chip {
            background: var(--bg-code);
            border: 1px solid var(--border);
            padding: 0.625rem 0.875rem;
            border-radius: 0.375rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .tag-chip:hover {
            border-color: var(--border-yellow);
            color: var(--yellow);
        }

        /* ========== 标签：SQL 注释小标题 ========== */
        .sql-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            opacity: 0.85;
        }

        /* ========== 色条（结论头部小色块） ========== */
        .accent-bar {
            width: 3px;
            height: 20px;
            border-radius: 1px;
            margin-right: 0.75rem;
            display: inline-block;
            vertical-align: middle;
        }
        .accent-yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow-glow); }
        .accent-red    { background: var(--red); }
        .accent-orange { background: var(--orange); }
        .accent-white  { background: var(--text-primary); }

        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #3A3A3A; }

        /* ========== 动画 ========== */
        .animate-fade { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 文字工具类（覆盖 Tailwind 默认） ========== */
        .text-heading     { color: var(--text-primary); }
        .text-body        { color: var(--text-secondary); }
        .text-muted-clr   { color: var(--text-muted); }
        .text-yellow-clr  { color: var(--yellow); }

        /* ========== 通告条（ClickHouse 风格） ========== */
        .banner {
            background: var(--yellow);
            color: #000;
            text-align: center;
            padding: 0.625rem 1rem;
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .banner a {
            color: #000;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
    </style>
</head>
<body>

    <!-- 侧边栏 -->
    <aside id="sidebar">
        <div class="sidebar-brand">
            <h2><span class="brand-dot"></span>CDP Insight</h2>
            <p>数据洞察专家系统</p>
        </div>
        <nav class="flex-1 py-2">
            <div class="sidebar-item active" onclick="navigate('modeling')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>

        <div id="page-content" class="max-w-6xl mx-auto space-y-8 animate-fade">
            <!-- 动态载入 -->
        </div>

    <script>
        let currentModule = '';
        let currentCat = '';
        let currentSub = '';

        const MASTER_DATA = {
            modeling: {
                title: "数据模型建模方案",
                desc: "ClickHouse 宽表画像与 Bitmap 高表索引设计规范",
                info: "所属模块 / BASE MODELING<br>UPDATED · 2026-01-20",
                intro: `
                    <section class="callout">
                        <h4 class="font-bold text-base text-heading mb-3 flex items-center gap-2">
                            <span class="w-2 h-2 bg-[#FAFF69] rounded-sm"></span>模型说明
                        </h4>
                        <div class="text-sm text-body space-y-2 leading-relaxed">
                            <p>在 ClickHouse 中可以使用<span class="text-yellow-clr font-semibold">宽表模型</span>与<span class="text-yellow-clr font-semibold">Bitmap 高表模型</span>进行圈人：</p>
                            <p>以用户订单的交易分析为例，分析用户的购买行为并进行人群圈选，高表与宽表有不同的应用场景。</p>
                            <ul class="list-none space-y-2 pl-0">
                                <li class="flex gap-2"><span class="text-yellow-clr">›</span><span><strong class="text-heading">宽表模型</strong>是一种基于包含丰富用户属性和特征的数据表，用于分析用户基本属性和行为特征，以便进行人群画像、定制化推荐等任务。</span></li>
                                <li class="flex gap-2"><span class="text-yellow-clr">›</span><span><strong class="text-heading">高表模型</strong>是一种基于包含大量事件或交互数据的数据表，用于分析用户行为序列、构建用户行为模型，以便进行个性化推荐、行为预测等任务。</span></li>
                            </ul>
                            <p>在人群圈选的业务中，通常会结合使用宽表 + 高表来进行圈人操作。</p>
                        </div>
                    </section>`,
                navs: [
                    { id: 'wide', label: '宽表模型：全量用户画像 (Wide Table)' },
                    { id: 'high', label: '高表模型：极速圈人索引 (Bitmap)' }
                ],
                content: {
                    wide: {
                        subTabs: [ { id: 'wideModeling', label: '宽表建模说明' }, { id: 'wideSchema', label: '宽表模型示例' }, { id: 'wideData', label: '生成测试数据' } ],
                        items: {
                            wideModeling: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">宽表建模说明</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">通常宽表模型有以下的特点：</h4><ul class="list-none ml-0 text-sm text-body space-y-2"><li class="flex gap-2"><span class="text-yellow-clr">—</span>使用 uid 为 key，日期进行分区，每一行代表一个用户，每一列代表一个标签，每一行代表一个用户在一个日期的所有表现前数据</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>宽表是最基础的数据，因此基于宽表能够做任何查询分析，但是圈人以及预估不如高表效率高</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>宽表可以结合物化视图做预聚合操作</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>无法离散化的标签只能用宽表来存储</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>基于 UID 做用户的明细查询，高并发的场景使用宽表会有更好的性能</li></ul></div><div><h4 class="text-base font-semibold text-heading mb-3">设计要点：</h4><ul class="list-none ml-0 text-sm text-body space-y-2"><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">分区键：</strong>通常使用日期作为分区，支持历史标签数据回溯</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">模型：</strong>使用 ReplacingMergeTree 模型，按照写入事件进行去重</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">排序键：</strong>根据 user_id 进行排序并去重，保持每个日期分区下 user_id 的唯一性</span></li></ul></div></div>`,
                            wideSchema: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">宽表模型示例</h2><pre class="code-block"><code>CREATE TABLE cdp.orders_based_table_wide\n(\n    -- ========= 基础信息 =========\n    user_id                          INT,\n    age                              INT,\n    gender                           CHAR(2),\n    city                             VARCHAR(50),\n    region                           VARCHAR(50),\n    region_type                      VARCHAR(50),\n    phone                            VARCHAR(20),\n    signup_date                      DATE,\n\n    -- ========= 交易指标 =========\n    total_orders                     INT,\n    total_spent                      DECIMAL(10, 2),\n    average_order_value              DECIMAL(10, 2),\n    max_order_value                  DECIMAL(10, 2),\n    min_order_value                  DECIMAL(10, 2),\n    first_order_date                 DATE,\n    last_order_date                  DATE,\n    total_order_return               INT,\n    total_order_cancel               INT,\n\n    -- ========= 渠道 =========\n    download_channel                 VARCHAR(100),\n    act_type                         VARCHAR(100),\n\n    -- ========= 广告点击（单调递增） =========\n    ad_channel_click_cnt_15d         BIGINT(20),\n    ad_channel_click_cnt_30d         BIGINT(20),\n    ad_channel_click_cnt_60d         BIGINT(20),\n    ad_channel_click_cnt_90d         BIGINT(20),\n    ad_channel_click_day_cnt_15d     BIGINT(20),\n    ad_channel_click_day_cnt_30d     BIGINT(20),\n    ad_channel_click_day_cnt_60d     BIGINT(20),\n    ad_channel_click_day_cnt_90d     BIGINT(20),\n\n    -- ========= 站内行为 =========\n    evaluate_click_cnt_15d           BIGINT(20),\n    evaluate_click_cnt_30d           BIGINT(20),\n    evaluate_click_cnt_60d           BIGINT(20),\n    evaluate_click_cnt_90d           BIGINT(20),\n    personal_center_click_cnt_15d    BIGINT(20),\n    personal_center_click_cnt_30d    BIGINT(20),\n    personal_center_click_cnt_60d    BIGINT(20),\n    personal_center_click_cnt_90d    BIGINT(20),\n\n    -- ========= 价格敏感度 =========\n    price_sensitive_10               BIGINT(20),\n    price_sensitive_20               BIGINT(20),\n    price_sensitive_30               BIGINT(20),\n    price_sensitive_40               BIGINT(20),\n    price_sensitive_50               BIGINT(20),\n\n    -- ========= 评分 =========\n    score                            BIGINT(20),\n    score_sc_15d                     BIGINT(20),\n    score_sc_30d                     BIGINT(20),\n    score_sc_60d                     BIGINT(20),\n    score_sc_90d                     BIGINT(20),\n\n    -- ========= 其他标签 =========\n    tag_999_A                        BIGINT(20),\n    tag_999_B                        BIGINT(20),\n    tag_999_C                        BIGINT(20),\n    tag_999_D                        BIGINT(20),\n\n    -- ========= 生命周期与活跃度 =========\n    first_active_date                DATE,\n    last_active_date                 DATE,\n    active_days_7d                   INT,\n    active_days_30d                  INT,\n\n    -- ========= 行为路径 / 漏斗 =========\n    exposure_cnt_30d                 INT,\n    click_cnt_30d                    INT,\n    add_cart_cnt_30d                 INT,\n    pay_cnt_30d                      INT,\n\n    -- ========= 活跃 / 流失状态 =========\n    is_active_7d                     UInt8,\n    is_active_30d                    UInt8,\n    is_churn_risk                    UInt8,\n\n    -- ========= 付费与价值分层 =========\n    is_payer                         UInt8,\n    is_high_value_user               UInt8,\n\n    -- ========= 触达与投放能力 =========\n    is_reachable                     UInt8,\n    last_reach_date                  DATE,\n\n    -- ========= 实验与人群拆分 =========\n    exp_bucket                       UInt8,\n    user_bucket_100                  UInt8,\n\n    -- ========= 快照与版本 =========\n    snapshot_date                    DATE\n)\nENGINE = ReplacingMergeTree(snapshot_date)\nPARTITION BY snapshot_date\nORDER BY (user_id);</code></pre></div>`,
                            wideData: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">生成测试数据</h2><pre class="code-block"><code>INSERT INTO cdp.orders_based_table_wide\nSELECT\n    user_id, age, gender, city, region, region_type, phone, signup_date,\n    total_orders, total_spent, average_order_value, max_order_value, min_order_value, first_order_date, last_order_date, total_order_return, total_order_cancel,\n    download_channel, act_type,\n    ad_click_15d, ad_click_30d, ad_click_60d, ad_click_90d, ad_click_day_15d, ad_click_day_30d, ad_click_day_60d, ad_click_day_90d,\n    eva_click_15d, eva_click_30d, eva_click_60d, eva_click_90d, pc_click_15d, pc_click_30d, pc_click_60d, pc_click_90d,\n    ps_10, ps_20, ps_30, ps_40, ps_50,\n    score, score_sc_15d, score_sc_30d, score_sc_60d, score_sc_90d,\n    tag_999_A, tag_999_B, tag_999_C, tag_999_D,\n    first_active_date, last_active_date, active_days_7d, active_days_30d,\n    exposure_cnt_30d, click_cnt_30d, add_cart_cnt_30d, pay_cnt_30d,\n    is_active_7d, is_active_30d, is_churn_risk, is_payer, is_high_value_user, is_reachable, last_reach_date,\n    exp_bucket, cityHash64(user_id) % 100 AS user_bucket_100, today() AS snapshot_date\nFROM\n(\n    SELECT\n        number + 10000000 AS user_id,\n        rand() % 60 + 18 AS age,\n        if(rand() % 2 = 0, 'M', 'F') AS gender,\n        arrayElement(['Beijing','Shanghai','Guangzhou','Shenzhen','Hangzhou'], rand() % 5 + 1) AS city,\n        rand() % 20 AS ad_base,\n        rand() % 15 AS eva_base\n    FROM numbers(100000000)\n)\nSETTINGS max_insert_block_size = 100000;</code></pre></div>`
                        }
                    },
                    high: {
                        subTabs: [ { id: 'highModeling', label: '高表建模说明' }, { id: 'highSchema', label: '高表建模示例' }, { id: 'highData', label: '向高表跑批插入数据' } ],
                        items: {
                            highModeling: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">高表建模说明</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">通常高表模型有以下的特点：</h4><ul class="list-none ml-0 text-sm text-body space-y-2"><li class="flex gap-2"><span class="text-yellow-clr">—</span>基于高表的圈人，人群预估效率极高</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>高表不方便支持标签变更，比如修改用的一个标签值，那么之前的标签值依然在，所以高表往往 key 中也需要加入日期</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>高表中的 user id 需要提前做字典编码，建议是从比较小的整数开始的自增编码，随机大范围编码会降低 bitmap 查询的效率</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>高表在插入或删除新的属性，不会引发数据移动，避免频繁修改 schema 信息</li></ul></div><div><h4 class="text-base font-semibold text-heading mb-3">设计要点：</h4><ul class="list-none ml-0 text-sm text-body space-y-2"><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">定位：</strong>高频、标准化标签筛选，追求毫秒级响应的生产级场景。</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">技术优势：</strong>利用 ClickHouse 的 AggregateFunction(groupBitmap, Int32) 预聚合能力</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">数据流转：</strong>从宽表定期将核心标签抽取至高表，实现"空间换时间"</span></li></ul></div></div>`,
                            highSchema: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">高表建模示例</h2><pre class="code-block"><code>DROP TABLE IF EXISTS cdp.user_tag_hight_bitmap;\n\nCREATE TABLE cdp.user_tag_hight_bitmap (\n    tag               VARCHAR(50),\n    tag_val           INT,\n    snapshot_date     DATE,\n    user_ids          AggregateFunction(groupBitmap, Int32)\n)\nENGINE = ReplacingMergeTree(snapshot_date)\nPARTITION BY snapshot_date\nORDER BY (tag, tag_val);</code></pre></div>`,
                            highData: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">向高表跑批插入数据</h2><p class="text-body text-sm mb-4">高表一般存储离线非动态标签（通常不经常改动）。</p><pre class="code-block"><code>insert into cdp.user_tag_hight_bitmap(\n    tag,\n    tag_val,\n    snapshot_date,\n    user_ids\n)\nselect  'ad_channel_click_cnt_15d',\n         10, \n         '2026-01-16',\n         groupBitmapState(user_id) \nfrom     orders_based_table_wide \nwhere    ad_channel_click_cnt_15d  = 10\n  and    snapshot_date = '2026-01-16';</code></pre></div>`
                        }
                    }
                }
            },
            group: {
                title: "人群定义与精细化圈选",
                desc: "多维人群画像特征提取与 Bitmap 极速圈选逻辑",
                info: "所属模块 / AUDIENCE SYSTEM<br>UPDATED · 2026-01-20",
                navs: [
                    { id: 'definition', label: '人群定义与精细化圈选' },
                    { id: 'persona', label: '人群规模预估与角色' }
                ],
                content: {
                    definition: {
                        intro: `<div class="callout mb-8"><h4 class="font-bold text-base text-heading mb-3 flex items-center gap-2"><span class="w-2 h-2 bg-[#FAFF69] rounded-sm"></span>多条件人群圈选 · 业务场景描述</h4><div class="space-y-4 text-sm text-body"><div><p class="font-bold text-heading">1. 业务场景：我们要找谁？</p><p class="mt-1">在 CDP 里，圈人是指通过不同的逻辑把目标找出来：</p><ul class="list-none ml-0 mt-2 space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">交集 (AND)：</strong>必须同时满足。如"高消费"且"近期活跃"。</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">并集 (OR)：</strong>满足其一即可。如"数码爱好者"或"游戏玩家"。</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">差集 (NOT)：</strong>排除掉一部分人。如"所有潜在客户"但排除"昨天刚买过的"。</span></li></ul></div><div><p class="font-bold text-heading">2. ClickHouse 是怎么做的？（Bitmap 极速运算）</p><p class="mt-1">ClickHouse 处理几亿人圈选之所以快，是因为它把每个用户 ID 变成了一个"小格子"（Bit），只有 0 和 1。</p><ul class="list-none ml-0 mt-2 space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">bitmapAnd (交集)：</strong>像滤网一样，两层滤网重叠，剩下的就是重合的人。</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">bitmapOr (并集)：</strong>把几个网兜里的人全部倒在一起。</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><strong class="text-heading">bitmapAndNot (差集)：</strong>最常用的"排除法"，直接从大包里扣掉不需要的部分。</span></li></ul></div></div></div>`,
                        subTabs: [ { id: 'highActive', label: '高质量活跃用户' }, { id: 'highPot', label: '活跃高潜未付费' }, { id: 'coverage', label: '覆盖型投放人群' } ],
                        items: {
                            highActive: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">高质量活跃用户（核心运营人群）</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body mb-2 text-sm">在日常运营或投放前，业务团队往往希望优先触达当前仍然活跃、且已经验证过价值的用户，以提升转化成功率并降低触达浪费。<br>该类用户通常具备以下特征：</p><ul class="list-none ml-0 text-sm text-body space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span>最近 30 天内仍有活跃行为</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>历史上至少有过一次下单行为</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>当前不处于流失风险状态</li></ul></div><div class="space-y-6"><h4 class="text-base font-semibold text-heading">示例</h4><div><p class="sql-label">// 使用宽表圈人</p><pre class="code-block"><code>SELECT  user_id\nFROM    orders_based_table_wide\nWHERE   is_active_30d = 1\n  AND   total_orders > 0\n  AND   is_churn_risk = 0\n  AND   snapshot_date = '2026-01-16'</code></pre></div><div><p class="sql-label">// 宽表生成 bitmap 后圈人</p><pre class="code-block"><code>SELECT   groupBitmapAndState(bm) AS user_cnt\nFROM     (\n    SELECT   groupBitmapState(user_id) AS bm\n    FROM     orders_based_table_wide\n    WHERE    snapshot_date = '2026-01-16' AND is_active_30d = 1\n    UNION ALL\n    SELECT   groupBitmapState(user_id) AS bm\n    FROM     orders_based_table_wide\n    WHERE    snapshot_date = '2026-01-16' AND total_orders > 0\n    UNION ALL\n    SELECT   groupBitmapState(user_id) AS bm\n    FROM     orders_based_table_wide\n    WHERE    snapshot_date = '2026-01-16' AND is_churn_risk = 0\n)</code></pre></div><div><p class="sql-label">// 使用高表圈人</p><pre class="code-block"><code>SELECT    groupBitmapAndState(bm)\n  FROM    (\n      SELECT    groupBitmapAndState(user_ids) bm\n      FROM      cdp.user_tag_hight_bitmap\n      WHERE     (tag = 'is_churn_risk' AND tag_val = 0 AND snapshot_date = '2026-01-16')\n      OR        (tag = 'is_active_30d ' AND tag_val = 1 AND snapshot_date = '2026-01-16')\n      UNION ALL\n      SELECT    groupBitmapState(user_id) bm\n      FROM      cdp.orders_based_table_wide\n      WHERE     snapshot_date = '2026-01-16' AND total_orders > 0\n)</code></pre></div></div></div>`,
                            highPot: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">活跃但尚未付费的高潜用户</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body mb-2 text-sm">在投放或精细化运营中，业务往往希望识别：</p><ul class="list-none ml-0 text-sm text-body space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span>近期频繁点击广告（已被吸引）</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>多次访问个人中心或核心功能（有探索意愿）</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>尚未产生深度互动或关键行为（仍有转化空间）</li></ul></div><div class="space-y-6"><h4 class="text-base font-semibold text-heading">示例</h4><div><p class="sql-label">// 宽表圈人</p><pre class="code-block"><code>SELECT count(user_id)\nFROM orders_based_table_wide\nWHERE snapshot_date = '2026-01-16'\n  AND ad_channel_click_cnt_15d = 8\n  AND personal_center_click_cnt_30d = 16\n  AND evaluate_click_cnt_60d = 36;</code></pre></div><div><p class="sql-label">// 基于宽表实时生成 bitmap</p><pre class="code-block"><code>WITH\n    (\n        SELECT groupBitmapState(user_id)\n        FROM orders_based_table_wide\n        WHERE snapshot_date = '2016-01-16'\n          AND ad_channel_click_cnt_15d = 8\n    ) AS bm_ad_interest,\n\n    (\n        SELECT groupBitmapState(user_id)\n        FROM orders_based_table_wide\n        WHERE snapshot_date = '2016-01-16'\n          AND personal_center_click_cnt_30d = 16\n    ) AS bm_product_focus,\n\n    (\n        SELECT groupBitmapState(user_id)\n        FROM orders_based_table_wide\n        WHERE snapshot_date = '2016-01-16'\n          AND evaluate_click_cnt_60d = 36\n    ) AS bm_deep_action\n\nSELECT\n    bitmapCardinality(\n        bitmapAndnot(bitmapAnd(bm_ad_interest, bm_product_focus), bm_deep_action)\n    ) AS target_user_cnt;</code></pre></div><div><p class="sql-label">// 高表圈人</p><pre class="code-block"><code>WITH\n    (\n        SELECT groupBitmapState(user_id)\n        FROM cdp.user_tag_hight_bitmap\n        WHERE snapshot_date = '2016-01-16'\n          AND tag = 'ad_channel_click_cnt_15d' AND tag_val = 8\n    ) AS bm_ad_interest,\n\n    (\n        SELECT groupBitmapState(user_id)\n        FROM cdp.user_tag_hight_bitmap\n        WHERE snapshot_date = '2016-01-16'\n          AND tag = 'personal_center_click_cnt_30d' AND tag_val = 16\n    ) AS bm_product_focus,\n\n    (\n        SELECT groupBitmapState(user_id)\n        FROM cdp.user_tag_hight_bitmap\n        WHERE snapshot_date = '2016-01-16'\n          AND tag = 'evaluate_click_cnt_60d' AND tag_val = 36\n    ) AS bm_deep_action\nSELECT\n    bitmapCardinality(\n        bitmapAndnot(bitmapAnd(bm_ad_interest, bm_product_focus), bm_deep_action)\n    ) AS target_user_cnt;</code></pre></div></div></div>`,
                            coverage: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">有兴趣信号但尚未转化的"覆盖型投放人群"</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body mb-2 text-sm">在广告冷启动或覆盖型投放阶段，业务往往希望：</p><ul class="list-none ml-0 text-sm text-body space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span>尽可能覆盖对产品"有过任何兴趣信号"的用户</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>同时排除：已经完成转化的用户、已经不需要再次投放的用户</li></ul></div><div class="space-y-6"><h4 class="text-base font-semibold text-heading">示例</h4><div><p class="sql-label">// 宽表圈人</p><pre class="code-block"><code>SELECT user_id\nFROM orders_based_table_wide\nWHERE snapshot_date = '2026-01-16'\n  AND (\n        ad_channel_click_cnt_15d = 10\n     OR personal_center_click_cnt_30d = 20\n  )\n  AND evaluate_click_cnt_60d <> 45;</code></pre></div><div><p class="sql-label">// 宽表实时生成 bitmap 圈人</p><pre class="code-block"><code>WITH\n    (SELECT groupBitmapState(user_id) FROM orders_based_table_wide WHERE snapshot_date = '2026-01-16' AND ad_channel_click_cnt_15d = 10)  AS label_a,\n    (SELECT groupBitmapState(user_id) FROM orders_based_table_wide WHERE snapshot_date = '2026-01-16' AND personal_center_click_cnt_30d = 20) AS label_b,\n    (SELECT groupBitmapState(user_id) FROM orders_based_table_wide WHERE snapshot_date = '2026-01-16'AND evaluate_click_cnt_60d = 45) AS label_c\nSELECT\n    bitmapCardinality(bitmapAndnot(bitmapOr(label_a, label_b), label_c)) AS user_cnt_in_A_and_B_not_in_C;</code></pre></div><div><p class="sql-label">// 高表圈人</p><pre class="code-block"><code>WITH\n    (SELECT user_ids FROM cdp.user_tag_hight_bitmap WHERE snapshot_date = '2026-01-16' AND tag = 'ad_channel_click_cnt_15d' AND tag_val = 10)  AS label_a,\n    (SELECT user_ids FROM cdp.user_tag_hight_bitmap WHERE snapshot_date = '2026-01-16' AND tag = 'personal_center_click_cnt_30d' AND tag_val = 15) AS label_b,\n    (SELECT user_ids FROM cdp.user_tag_hight_bitmap WHERE snapshot_date = '2026-01-16' AND tag = 'evaluate_click_cnt_60d' AND tag_val = 45) AS label_c</code></pre></div></div></div>`
                        }
                    },
                    persona: {
                        subTabs: [ { id: 'size', label: '核心活跃付费人群规模预估' }, { id: 'freq', label: '行为频次差异分析' } ],
                        items: {
                            size: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">核心活跃付费人群的规模预估</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body mb-2 text-sm">在运营或投放前，业务希望评估一个高质量核心人群是否具备足够规模：</p><ul class="list-none ml-0 text-sm text-body space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span>最近 30 天仍然活跃</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>历史上有过下单行为</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>当前不处于流失风险状态</li></ul></div><div class="space-y-6"><h4 class="text-base font-semibold text-heading">示例</h4><div><p class="sql-label">// 宽表</p><pre class="code-block"><code>SELECT count(DISTINCT user_id) AS user_cnt\nFROM orders_based_table_wide\nWHERE is_active_30d = 1\n  AND total_orders > 0\n  AND is_churn_risk = 0\n  AND snapshot_date = '2026-01-16';</code></pre></div><div><p class="sql-label">// 宽表实时生成 bitmap</p><pre class="code-block"><code>SELECT\n    bitmapCardinality(\n        groupBitmapAndState(bm)\n    ) AS user_cnt\nFROM\n(\n    SELECT groupBitmapState(user_id) AS bm\n    FROM orders_based_table_wide\n    WHERE is_active_30d = 1 and snapshot_date = '2026-01-16'\n\n    UNION ALL\n\n    SELECT groupBitmapState(user_id)\n    FROM orders_based_table_wide\n    WHERE total_orders > 0 and snapshot_date = '2026-01-16'\n\n    UNION ALL\n\n    SELECT groupBitmapState(user_id)\n    FROM orders_based_table_wide\n    WHERE is_churn_risk = 0 and snapshot_date = '2026-01-16'\n)</code></pre></div><div><p class="sql-label">// 高表圈人</p><pre class="code-block"><code>SELECT    bitmapCardinality(groupBitmapAndState(bm))\n  FROM    (\n      SELECT    groupBitmapAndState(user_ids) bm\n      FROM      cdp.user_tag_hight_bitmap\n      WHERE     (tag = 'is_churn_risk' AND tag_val = 0 AND snapshot_date = '2026-01-16')\n      OR        (tag = 'is_active_30d ' AND tag_val = 1 AND snapshot_date = '2026-01-16')\n      UNION ALL\n      SELECT    groupBitmapState(user_id) bm\n      FROM      cdp.orders_based_table_wide\n      WHERE     snapshot_date = '2026-01-16' AND total_orders > 0\n)</code></pre></div></div></div>`,
                            freq: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">行为频次差异（目标人群 vs 全量）</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body mb-2 text-sm">除了属性分布，业务还常常关心：</p><ul class="list-none ml-0 text-sm text-body space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span>这个人群是不是更活跃？</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>行为强度是否显著高于整体？</li></ul><p class="text-sm font-semibold text-yellow-clr mt-2">→ 这是 行为频次差异分析。</p></div><div class="space-y-6"><h4 class="text-base font-semibold text-heading">示例</h4><div><p class="sql-label">// 宽表</p><pre class="code-block"><code>SELECT\n    avgIf(\n        exposure_cnt_30d,\n        ad_channel_click_cnt_15d = 8\n        AND personal_center_click_cnt_30d = 16\n        AND evaluate_click_cnt_60d = 36\n    ) AS target_avg_exposure,\n\n    avg(exposure_cnt_30d) AS all_avg_exposure,\n\n    target_avg_exposure / all_avg_exposure AS index\nFROM orders_based_table_wide\nWHERE snapshot_date = '2026-01-16';</code></pre></div><div><p class="sql-label">// 宽表实时生成 bitmap</p><pre class="code-block"><code>WITH\n    (\n        SELECT groupBitmapState(user_id)\n        FROM orders_based_table_wide\n        WHERE ad_channel_click_cnt_15d = 8\n          AND snapshot_date = '2026-01-16'\n    ) AS bm_ad,\n\n    (\n        SELECT groupBitmapState(user_id)\n        FROM orders_based_table_wide\n        WHERE personal_center_click_cnt_30d = 16\n          AND snapshot_date = '2026-01-16'\n    ) AS bm_pc,\n\n    (\n        SELECT groupBitmapState(user_id)\n        FROM orders_based_table_wide\n        WHERE evaluate_click_cnt_60d = 36\n          AND snapshot_date = '2026-01-16'\n    ) AS bm_eval\n\nSELECT\n    avgIf(\n        exposure_cnt_30d,\n        bitmapContains(\n            bitmapAnd(bitmapAnd(bm_ad, bm_pc), bm_eval),\n            user_id\n        )\n    ) AS target_avg,\n\n    avg(exposure_cnt_30d) AS all_avg,\n\n    target_avg / all_avg AS index\nFROM orders_based_table_wide\nWHERE snapshot_date = '2026-01-16';</code></pre></div><div><p class="sql-label">// 高表圈人</p><pre class="code-block"><code>WITH\n    (\n        SELECT user_ids\n        FROM cdp.user_tag_hight_bitmap\n        WHERE tag = 'ad_channel_click_cnt_15d' AND tag_val = 8 AND snapshot_date = '2026-01-16'\n    ) AS bm_ad,\n\n    (\n        SELECT user_ids\n        FROM cdp.user_tag_hight_bitmap\n        WHERE tag = 'personal_center_click_cnt_30d' AND tag_val = 16 AND snapshot_date = '2026-01-16'\n    ) AS bm_pc,\n\n    (\n        SELECT user_ids\n        FROM cdp.user_tag_hight_bitmap\n        WHERE tag = 'evaluate_click_cnt_60d' AND tag_val = 36 AND snapshot_date = '2026-01-16'\n    ) AS bm_eval\n\nSELECT\n    avgIf(\n        exposure_cnt_30d,\n        bitmapContains(\n            bitmapAnd(bitmapAnd(bm_ad, bm_pc), bm_eval),\n            user_id\n        )\n    ) AS target_avg,\n\n    avg(exposure_cnt_30d) AS all_avg,\n\n    target_avg / all_avg AS index\nFROM orders_based_table_wide\nWHERE snapshot_date = '2026-01-16';</code></pre></div></div></div>`
                        }
                    }
                }

                navs: [

                content: {
                    funnel: {
                        subTabs: [
                            { id: 'basic', label: '基础漏斗' },
                            { id: 'conversion', label: '转化率可视化' }
                        ],
                        items: {
                            basic: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">基础漏斗 · windowFunnel</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body text-sm mb-2">电商最典型的"曝光 → 点击 → 加购 → 付款"四步漏斗。windowFunnel 会在一个时间窗口内扫描用户事件流，返回按顺序完成到的最大步数：</p><ul class="list-none ml-0 text-sm text-body space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span>level = 0：首步都没触发</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>level = 1：只完成了第 1 步</li><li class="flex gap-2"><span class="text-yellow-clr">—</span>level = N：完整走完所有步骤</li></ul></div><div class="space-y-6"><h4 class="text-base font-semibold text-heading">函数签名</h4><pre class="code-block"><code>windowFunnel(window_seconds[, mode])(timestamp, cond1, cond2, ..., condN)\n\n-- window_seconds : 允许的总窗口（秒）\n-- mode           : 'strict_order' | 'strict_increase' | 'strict_deduplication' （可选）\n-- 返回           : UInt8，按顺序达到的最大步数</code></pre><h4 class="text-base font-semibold text-heading">示例：四步漏斗（30 分钟窗口）</h4><div><p class="sql-label">// 每一步对应的用户数</p><pre class="code-block"><code>SELECT\n    level,\n    count() AS user_cnt\nFROM (\n    SELECT\n        user_id,\n        windowFunnel(1800)(\n            event_time,\n            event_name = 'view',\n            event_name = 'click',\n            event_name = 'add_cart',\n            event_name = 'pay'\n        ) AS level\n    FROM cdp.user_events\n    WHERE event_date = '2026-01-16'\n    GROUP BY user_id\n)\nGROUP BY level\nORDER BY level;</code></pre></div><h4 class="text-base font-semibold text-heading">典型输出</h4><div class="overflow-x-auto"><table class="perf-table"><thead><tr><th>level</th><th>含义</th><th>user_cnt (示例)</th></tr></thead><tbody><tr><td>0</td><td>未触发首步</td><td>412,350</td></tr><tr><td>1</td><td>仅 view</td><td>1,284,920</td></tr><tr><td>2</td><td>view + click</td><td>523,108</td></tr><tr><td>3</td><td>view + click + add_cart</td><td>89,445</td></tr><tr class="highlight-row"><td>4</td><td>完整转化</td><td>21,307</td></tr></tbody></table></div><div class="callout mt-4"><p class="text-body text-sm"><strong class="text-heading">注意：</strong>windowFunnel 的"窗口"是从<em>第一个满足 cond1 的事件</em>开始计时，不是查询时间范围。同一用户在一天内若多次触发漏斗，只取能到达的最大 level。</p></div></div></div>`,
                            conversion: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">漏斗转化率可视化</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body text-sm">光有每一步的人数还不够，业务更关心<span class="text-yellow-clr font-semibold">相邻步骤的转化率</span>以及<span class="text-yellow-clr font-semibold">最薄弱的环节</span>。ClickHouse 的 <span class="mono text-yellow-clr">bar()</span> 函数可以在 SQL 结果里直接绘制 ASCII 条形图，配合窗口函数就能做出"带图形的漏斗报表"。</p></div><div class="space-y-6"><div><p class="sql-label">// 漏斗 · 累计转化率 · 单步转化率 · ASCII bar</p><pre class="code-block"><code>WITH funnel AS (\n    SELECT\n        level,\n        count() AS cnt\n    FROM (\n        SELECT\n            user_id,\n            windowFunnel(3600)(\n                event_time,\n                event_name = 'view',\n                event_name = 'click',\n                event_name = 'add_cart',\n                event_name = 'pay'\n            ) AS level\n        FROM cdp.user_events\n        WHERE event_date BETWEEN '2026-01-10' AND '2026-01-16'\n        GROUP BY user_id\n    )\n    WHERE level > 0\n    GROUP BY level\n)\nSELECT\n    level,\n    cnt                                                      AS reach_cnt,\n    round(cnt * 100.0 / max(cnt) OVER (), 2)                 AS pct_of_top,\n    round(cnt * 100.0 / lagInFrame(cnt) OVER (ORDER BY level), 2) AS step_conv_pct,\n    bar(cnt, 0, max(cnt) OVER (), 30)                        AS chart\nFROM funnel\nORDER BY level;</code></pre></div><h4 class="text-base font-semibold text-heading">典型输出</h4><pre class="code-block"><code>level │ reach_cnt  │ pct_of_top │ step_conv │ chart\n──────┼────────────┼────────────┼───────────┼──────────────────────────────\n  1   │ 1,284,920  │   100.00   │    NULL   │ ██████████████████████████████\n  2   │   523,108  │    40.71   │   40.71   │ ████████████▏\n  3   │    89,445  │     6.96   │   17.10   │ ██▏\n  4   │    21,307  │     1.66   │   23.82   │ ▌</code></pre><div class="callout-yellow mt-4"><p>从这个结果一眼能看出：最大流失出现在 <span class="mono">level 2 → 3</span>（点击后加购），仅 <strong>17.10%</strong> 继续。这一步最值得做优化实验。</p></div></div></div>`
                        }
                    },
                    retention: {
                        subTabs: [
                            { id: 'basic', label: 'retention 函数原理' },
                            { id: 'matrix', label: '多日留存矩阵' }
                        ],
                        items: {
                            basic: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">retention 函数原理</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">函数签名</h4><pre class="code-block"><code>retention(cond1, cond2, ..., condN)\n\n-- 返回 : Array(UInt8)，长度为 N\n-- r[1] = 1 当且仅当 cond1 成立（基准锚点）\n-- r[i] = 1 当且仅当 cond1 AND cond_i 同时成立（i >= 2）\n-- cond1 不满足时 r 全为 0</code></pre></div><div class="space-y-6"><h4 class="text-base font-semibold text-heading">业务场景</h4><p class="text-body text-sm">判断"某基准日活跃的用户，在后续几天是否还活跃"——最经典的留存分析。</p><div><p class="sql-label">// 查看每个用户的留存标记数组</p><pre class="code-block"><code>SELECT\n    user_id,\n    retention(\n        event_date = '2026-01-01',    -- 基准日\n        event_date = '2026-01-02',    -- D+1\n        event_date = '2026-01-03'     -- D+2\n    ) AS r\nFROM cdp.user_events\nWHERE event_date BETWEEN '2026-01-01' AND '2026-01-03'\nGROUP BY user_id\nLIMIT 5;</code></pre></div><h4 class="text-base font-semibold text-heading">返回示例</h4><div class="overflow-x-auto"><table class="perf-table"><thead><tr><th>user_id</th><th>r (Array)</th><th>解读</th></tr></thead><tbody><tr><td>10001</td><td>[1, 1, 0]</td><td>基准日活跃 · 次日活跃 · D+2 流失</td></tr><tr><td>10002</td><td>[1, 0, 1]</td><td>基准日活跃 · 次日流失 · D+2 回流</td></tr><tr><td>10003</td><td>[0, 0, 0]</td><td>基准日未活跃 → 后续全部归零</td></tr><tr class="highlight-row"><td>10004</td><td>[1, 1, 1]</td><td>连续三天活跃（强留存）</td></tr></tbody></table></div><div class="callout mt-4"><p class="text-body text-sm"><strong class="text-heading">关键理解：</strong>retention 的第一个条件永远是"基准锚点"，后面每一个条件都隐含地 AND 了它。这避免了把"基准日没活跃但后续活跃"的用户错误计入留存分子。</p></div></div></div>`,
                            matrix: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">多日留存矩阵：D+1 / D+7 / D+30</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body text-sm">基于 retention 返回的数组做聚合，一次查询拿到多日留存率，适合生成留存仪表盘。</p></div><div class="space-y-6"><div><p class="sql-label">// 一次查询 · 多窗口留存</p><pre class="code-block"><code>SELECT\n    sum(r[1])                                       AS d0_users,\n    sum(r[2])                                       AS d1_users,\n    sum(r[3])                                       AS d7_users,\n    sum(r[4])                                       AS d30_users,\n    round(sum(r[2]) * 100.0 / sum(r[1]), 2)         AS d1_retention_pct,\n    round(sum(r[3]) * 100.0 / sum(r[1]), 2)         AS d7_retention_pct,\n    round(sum(r[4]) * 100.0 / sum(r[1]), 2)         AS d30_retention_pct\nFROM (\n    SELECT\n        user_id,\n        retention(\n            event_date = '2026-01-01',\n            event_date = '2026-01-02',\n            event_date = '2026-01-08',\n            event_date = '2026-01-31'\n        ) AS r\n    FROM cdp.user_events\n    WHERE event_date BETWEEN '2026-01-01' AND '2026-01-31'\n    GROUP BY user_id\n);</code></pre></div><h4 class="text-base font-semibold text-heading">按首次来源渠道拆分留存</h4><div><p class="sql-label">// 结合 argMin 做渠道归因 + 留存矩阵</p><pre class="code-block"><code>SELECT\n    first_channel,\n    sum(r[1])                                       AS d0,\n    round(sum(r[2]) * 100.0 / sum(r[1]), 2)         AS d1_pct,\n    round(sum(r[3]) * 100.0 / sum(r[1]), 2)         AS d7_pct,\n    round(sum(r[4]) * 100.0 / sum(r[1]), 2)         AS d30_pct\nFROM (\n    SELECT\n        user_id,\n        argMin(channel, event_time) AS first_channel,\n        retention(\n            event_date = '2026-01-01',\n            event_date = '2026-01-02',\n            event_date = '2026-01-08',\n            event_date = '2026-01-31'\n        ) AS r\n    FROM cdp.user_events\n    WHERE event_date BETWEEN '2026-01-01' AND '2026-01-31'\n    GROUP BY user_id\n)\nGROUP BY first_channel\nORDER BY d0 DESC;</code></pre></div><h4 class="text-base font-semibold text-heading">典型输出</h4><div class="overflow-x-auto"><table class="perf-table"><thead><tr><th>first_channel</th><th>d0</th><th>d1_pct</th><th>d7_pct</th><th>d30_pct</th></tr></thead><tbody><tr class="highlight-row"><td>organic</td><td>42,108</td><td>58.31</td><td>34.20</td><td>22.07</td></tr><tr><td>referral</td><td>18,442</td><td>48.92</td><td>27.81</td><td>15.30</td></tr><tr><td>paid_ad</td><td>95,730</td><td>31.25</td><td>12.04</td><td>4.66</td></tr><tr><td>affiliate</td><td>7,120</td><td>22.18</td><td>8.03</td><td>2.91</td></tr></tbody></table></div><div class="callout-yellow mt-4"><p>自然流量（organic）虽然量最小，但 D30 留存是付费广告的 <strong>4.7×</strong>。这是典型的"量 vs 质"决策信号——应该在归因模型里加权。</p></div></div></div>`
                        }
                    },
                    sequence: {
                        subTabs: [
                            { id: 'match', label: 'sequenceMatch / Count' },
                            { id: 'path', label: 'groupArray 路径分析' },
                            { id: 'firstlast', label: 'argMax / argMin 首末行为' }
                        ],
                        items: {
                            match: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">sequenceMatch / sequenceCount</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">函数签名与 pattern 语法</h4><pre class="code-block"><code>sequenceMatch(pattern)(timestamp, cond1, cond2, ..., condN) → UInt8  (0/1)\nsequenceCount(pattern)(timestamp, cond1, cond2, ..., condN) → UInt64 (命中次数)\n\n-- Pattern DSL ：\n--   (?N)      第 N 个条件匹配\n--   (?t>=K)   距上一事件至少 K 秒\n--   (?t<=K)   距上一事件至多 K 秒\n--   .*        任意事件（零个或多个）</code></pre></div><div class="space-y-8"><div><h4 class="text-base font-semibold text-heading mb-3">场景 1 · 加购后 1 小时内完成下单</h4><p class="sql-label">// 命中即刻转化模式的用户数</p><pre class="code-block"><code>SELECT count(DISTINCT user_id) AS fast_convert_users\nFROM (\n    SELECT\n        user_id,\n        sequenceMatch('(?1)(?t<=3600)(?2)')(\n            event_time,\n            event_name = 'add_cart',\n            event_name = 'pay'\n        ) AS matched\n    FROM cdp.user_events\n    WHERE event_date = '2026-01-16'\n    GROUP BY user_id\n)\nWHERE matched = 1;</code></pre></div><div><h4 class="text-base font-semibold text-heading mb-3">场景 2 · 加购后反复浏览但未下单（高意向流失）</h4><p class="sql-label">// 两个模式同时判定：命中"加购 + 多次浏览"且未命中"加购 → 付款"</p><pre class="code-block"><code>SELECT count(DISTINCT user_id) AS hesitant_users\nFROM (\n    SELECT\n        user_id,\n        sequenceMatch('(?1).*(?2).*(?2)')(\n            event_time,\n            event_name = 'add_cart',\n            event_name = 'view'\n        ) AS m_hesitate,\n        sequenceMatch('(?1).*(?2)')(\n            event_time,\n            event_name = 'add_cart',\n            event_name = 'pay'\n        ) AS m_converted\n    FROM cdp.user_events\n    WHERE event_date = '2026-01-16'\n    GROUP BY user_id\n)\nWHERE m_hesitate = 1 AND m_converted = 0;</code></pre><div class="callout-yellow mt-3"><p>这个人群是<strong>召回投放的黄金目标</strong>——有明确购买意向，只差临门一脚。</p></div></div><div><h4 class="text-base font-semibold text-heading mb-3">场景 3 · sequenceCount · 重度即时转化用户</h4><p class="sql-label">// 一周内多次"加购即下单"的用户</p><pre class="code-block"><code>SELECT\n    user_id,\n    sequenceCount('(?1)(?t<=3600)(?2)')(\n        event_time,\n        event_name = 'add_cart',\n        event_name = 'pay'\n    ) AS fast_convert_cnt\nFROM cdp.user_events\nWHERE event_date BETWEEN '2026-01-10' AND '2026-01-16'\nGROUP BY user_id\nHAVING fast_convert_cnt >= 3\nORDER BY fast_convert_cnt DESC\nLIMIT 100;</code></pre></div></div></div>`,
                            path: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">groupArray 路径分析</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">业务场景</h4><p class="text-body text-sm">sequenceMatch 适合判定"是否命中某模式"，但业务还经常想知道"<strong class="text-yellow-clr">用户到底走过哪些路径</strong>"——比如付款前最常见的 N 步行为序列是什么。</p><p class="text-body text-sm mt-2">思路：先按时间排序，用 <span class="mono text-yellow-clr">groupArray</span> 把每个用户的完整事件链收集成数组，再切片、拼接、聚合。</p></div><div class="space-y-6"><div><h4 class="text-base font-semibold text-heading mb-3">付款前 4 步路径分布</h4><p class="sql-label">// 还原 pay 之前的行为链</p><pre class="code-block"><code>SELECT\n    path,\n    count()                                              AS user_cnt,\n    round(count() * 100.0 / sum(count()) OVER (), 2)     AS pct\nFROM (\n    SELECT\n        user_id,\n        arrayStringConcat(\n            arraySlice(groupArray(event_name), -4, 4),\n            ' → '\n        ) AS path\n    FROM (\n        SELECT user_id, event_name, event_time\n        FROM cdp.user_events\n        WHERE event_date = '2026-01-16'\n        ORDER BY user_id, event_time\n    )\n    GROUP BY user_id\n    HAVING has(groupArray(event_name), 'pay')\n)\nGROUP BY path\nORDER BY user_cnt DESC\nLIMIT 10;</code></pre></div><h4 class="text-base font-semibold text-heading">典型输出</h4><pre class="code-block"><code>path                                          │ user_cnt │  pct\n──────────────────────────────────────────────┼──────────┼──────\nview → click → add_cart → pay                 │  12,450  │ 38.12\nview → view → click → pay                     │   3,820  │ 11.70\nclick → add_cart → add_cart → pay             │   2,104  │  6.44\nview → click → pay → view                     │   1,892  │  5.79\nadd_cart → view → click → pay                 │   1,567  │  4.80\n...</code></pre><div class="callout mt-4"><p class="text-body text-sm"><strong class="text-heading">常用变形：</strong></p><ul class="list-none ml-0 text-sm text-body mt-2 space-y-1"><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><span class="mono text-yellow-clr">groupArrayDistinct</span>：去重版路径（只关注"经过哪些页面"，不关心次数）</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><span class="mono text-yellow-clr">groupArray(10)</span>：限定最多保留 10 个事件，防止数组过大</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><span class="mono text-yellow-clr">arrayFilter(x -> x != 'view', ...)</span>：先过滤噪音事件再构造路径</span></li><li class="flex gap-2"><span class="text-yellow-clr">—</span><span><span class="mono text-yellow-clr">arrayZip + arrayMap</span>：同时拼接 event_name 和 page，得到带页面的路径</span></li></ul></div></div></div>`,
                            firstlast: `<div class="glass-card p-8"><h2 class="text-2xl font-bold mb-6 section-title">argMax / argMin · 首末行为</h2><div class="mb-8"><h4 class="text-base font-semibold text-heading mb-3">函数签名</h4><pre class="code-block"><code>argMin(val, arg) : 返回 arg 最小时对应的 val\nargMax(val, arg) : 返回 arg 最大时对应的 val\n\n-- 行为分析里最常用法：\n--   argMin(x, event_time)  =  用户首次的 x\n--   argMax(x, event_time)  =  用户末次的 x</code></pre></div><div class="space-y-6"><div><h4 class="text-base font-semibold text-heading mb-3">场景 1 · 首次来源渠道 + 末次交互页面</h4><pre class="code-block"><code>SELECT\n    user_id,\n    min(event_time)                     AS first_seen,\n    max(event_time)                     AS last_seen,\n    argMin(channel, event_time)         AS first_channel,\n    argMin(page, event_time)            AS first_page,\n    argMax(page, event_time)            AS last_page,\n    argMax(event_name, event_time)      AS last_event\nFROM cdp.user_events\nWHERE event_date BETWEEN '2026-01-01' AND '2026-01-16'\nGROUP BY user_id\nLIMIT 100;</code></pre></div><div><h4 class="text-base font-semibold text-heading mb-3">场景 2 · 归因 · 按首次渠道看付费转化</h4><pre class="code-block"><code>SELECT\n    first_channel,\n    count()                                               AS total_users,\n    sum(has_pay)                                          AS paying_users,\n    round(sum(has_pay) * 100.0 / count(), 2)              AS pay_rate_pct\nFROM (\n    SELECT\n        user_id,\n        argMin(channel, event_time)           AS first_channel,\n        max(event_name = 'pay')               AS has_pay\n    FROM cdp.user_events\n    WHERE event_date BETWEEN '2026-01-01' AND '2026-01-16'\n    GROUP BY user_id\n)\nGROUP BY first_channel\nORDER BY paying_users DESC;</code></pre></div><div><h4 class="text-base font-semibold text-heading mb-3">场景 3 · 沉默用户的末次行为画像（召回线索）</h4><pre class="code-block"><code>SELECT\n    last_event,\n    last_page,\n    count() AS silent_user_cnt\nFROM (\n    SELECT\n        user_id,\n        argMax(event_name, event_time) AS last_event,\n        argMax(page, event_time)       AS last_page,\n        max(event_time)                AS last_seen\n    FROM cdp.user_events\n    WHERE event_date BETWEEN '2025-11-01' AND '2026-01-16'\n    GROUP BY user_id\n    HAVING last_seen < '2025-12-16 00:00:00'   -- 30 天以上未活跃\n)\nGROUP BY last_event, last_page\nORDER BY silent_user_cnt DESC\nLIMIT 20;</code></pre></div><div class="callout-yellow"><p><strong>argMin / argMax 的威力在于单次扫描同时产出"首次 + 末次"——</strong>不需要 self-join、不需要窗口函数，对亿级事件流也只是一次 GROUP BY 的代价。</p></div></div></div>`
                        }
                    }

nterest,\n\n    (\n        SELECT user_ids\n        FROM cdp.user_tag_hight_bitmap\n        WHERE tag = 'personal_center_click_cnt_30d' AND tag_val = 10 AND snapshot_date = '2026-01-16'\n    ) AS bm_pc_interest,\n\n    (\n        SELECT user_ids\n        FROM cdp.user_tag_hight_bitmap\n        WHERE tag = 'is_payer' AND tag_val = 1 AND snapshot_date = '2026-01-16'\n    ) AS bm_converted\nSELECT\n    bitmapCardinality(\n        bitmapAndnot(\n            bitmapOr(bm_ad_interest, bm_pc_interest),\n            bm_converted\n        )\n    ) AS candidate_user_cnt;</code></pre></div></div></div>`,

g = 'active_days_7d'\n          AND tag_val = 3\n          AND snapshot_date = '2026-01-16'\n    ) AS bm_active_loose_cnt\nSELECT\n    bm_active_strict_cnt AS strict_rule_cnt,\n    bm_active_loose_cnt AS loose_rule_cnt;</code></pre></div></div></div>`

            }

            const subNav = document.getElementById('sub-nav-container');
            if (catData.subTabs && catData.subTabs.length > 0) {
                subNav.style.display = 'inline-flex';
                subNav.innerHTML = catData.subTabs.map(tab => `<button onclick="switchSubTab('${tab.id}')" id="sub-tab-${tab.id}" class="sub-tab-pill">${tab.label}</button>`).join('');
                switchSubTab(catData.subTabs[0].id);
            } else {
                subNav.style.display = 'none';
                renderItem('main');
            }
        }

        function switchSubTab(subId) {
            currentSub = subId;
            document.querySelectorAll('.sub-tab-pill').forEach(btn => btn.classList.remove('active'));
            const activeSub = document.getElementById('sub-tab-' + subId);
            if(activeSub) activeSub.classList.add('active');
            renderItem(subId);
        }

        function renderItem(itemId) {
            const area = document.getElementById('content-area');
            const catData = MASTER_DATA[currentModule].content[currentCat];
            area.innerHTML = catData.items[itemId] || '';

            if (currentModule === 'performance' && currentCat === 'result') {
                setTimeout(renderPerfCharts, 50);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPerfCharts() {
            // ClickHouse palette for charts
            const COLOR_WIDE   = '#4A4A4A'; // 宽表 · 最慢（灰）
            const COLOR_BITMAP = '#A8A8A8'; // bitmap · 中间（浅灰）
            const COLOR_HIGH   = '#FAFF69'; // 高表 · 胜出（亮黄）
            const GRID         = 'rgba(255,255,255,0.05)';
            const TICK_COLOR   = '#6E6E6E';
            const LABEL_COLOR  = '#A8A8A8';

            const chartData = [
                { id: 'chart-3labels', labels: ['2c8G×1','2c8G×2','4c16G×2','8c32G×2','8c32G×3','16c64G×3'], wide: [35.159, 41.94, 14.743, 7.497, 5.001, 4.303], bitmap: [23.463, 23.783, 11.473, 5.6, 5.754, 2.931], high: [0.244, 0.986, 0.583, 0.569, 0.193, 0.576] },
                { id: 'chart-6labels', labels: ['2c8G×1','2c8G×2','4c16G×2','8c16G×2','8c16G×3','16c64G×3'], wide: [38.328, 44.349, 27.051, 13.746, 10.391, 5.496], bitmap: [46.944, 46.425, 23.747, 11.334, 5.59, 5.883], high: [0.416, 0.331, 0.271, 0.766, 0.242, 0.765] },
                { id: 'chart-9labels', labels: ['2c8G×1','2c8G×2','4c16G×2','8c16G×2','8c16G×3','16c64G×3'], wide: [54.317, 55.389, 27.538, 13.292, 13.322, 6.904], bitmap: [67.536, 64.3, 32.217, 15.409, 15.233, 7.933], high: [0.398, 0.649, 0.570, 0.771, 0.550, 0.619] }
            ];

            chartData.forEach(d => {
                const ctx = document.getElementById(d.id);
                if (ctx) {
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: d.labels,
                            datasets: [
                                { label: '宽表', data: d.wide, backgroundColor: COLOR_WIDE, borderRadius: 2, borderSkipped: false },
                                { label: 'bitmap', data: d.bitmap, backgroundColor: COLOR_BITMAP, borderRadius: 2, borderSkipped: false },
                                { label: '高表圈人', data: d.high, backgroundColor: COLOR_HIGH, borderRadius: 2, borderSkipped: false }
                            ]
                        },
                        options: {
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: { color: LABEL_COLOR, font: { family: 'Inter', size: 12, weight: '600' }, padding: 16, boxWidth: 12, boxHeight: 12 }
                                },
                                tooltip: {
                                    backgroundColor: '#0A0A0A',
                                    borderColor: '#2A2A2A',
                                    borderWidth: 1,
                                    titleColor: '#FAFF69',
                                    bodyColor: '#FFFFFF',
                                    padding: 12,
                                    titleFont: { family: 'JetBrains Mono', size: 11 },
                                    bodyFont: { family: 'JetBrains Mono', size: 12 }
                                }
                            },
                            scales: {
                                x: {
                                    ticks: { color: TICK_COLOR, font: { family: 'JetBrains Mono', size: 11 } },
                                    grid: { color: GRID, drawBorder: false }
                                },
                                y: {
                                    beginAtZero: true,
                                    title: { display: true, text: 'TIME (s)', color: TICK_COLOR, font: { family: 'JetBrains Mono', size: 10, weight: '600' } },
                                    ticks: { color: TICK_COLOR, font: { family: 'JetBrains Mono', size: 11 } },
                                    grid: { color: GRID, drawBorder: false }
                                }
                            }
                        }
                    });
                }
            });
        }

        function toggleConclusion(id) {
            const content = document.getElementById(id);
            const item = content.closest('.conclusion-item');
            const isActive = content.classList.contains('active');
            content.classList.toggle('active', !isActive);
            item.classList.toggle('is-open', !isActive);
        }

        window.onload = () => navigate('modeling');
    </script>
</body>
</html>
